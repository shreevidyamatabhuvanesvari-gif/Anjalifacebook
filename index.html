<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reel Creator</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: sans-serif;
  height: 100vh;
  overflow: hidden;
}

/* FULL SCREEN CONTAINER */
.container {
  width: 100%;
  height: 100vh;
}

/* INPUTS */
input, textarea {
  width: 90%;
  margin: 10px auto;
  display: block;
  padding: 10px;
  font-size: 16px;
  border-radius: 6px;
  border: none;
}

/* PREVIEW AREA */
.preview {
  position: relative;
  width: 100%;
  height: 100vh;
  background: black;
  overflow: hidden;
}

/* IMAGE */
.preview img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
}

/* TEXT BOX */
.text-box {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 90%;
  padding: 20px;
  background: rgba(0,0,0,0.6);
  color: white;
  text-align: center;
  font-size: 22px;
  line-height: 1.7;
  border-radius: 12px;
}

/* PLAY BUTTON */
.play-btn {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 26px;
  padding: 14px 20px;
  border: none;
  border-radius: 50%;
  background: white;
  color: black;
  cursor: pointer;
  z-index: 10;
}

/* VOICE BUTTONS */
.voice-controls {
  position: absolute;
  top: 10px;
  left: 10px;
  z-index: 8;
}

.voice-controls button {
  margin-right: 5px;
  padding: 6px 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
}

/* ✅ PROFESSIONAL WATERMARK */
.watermark {
  position: absolute;

  bottom: 18px;
  right: 18px;

  color: rgba(255,255,255,0.55);

  font-size: 18px;
  font-weight: 600;
  font-style: italic;

  letter-spacing: 1px;

  text-shadow:
    1px 1px 4px rgba(0,0,0,0.8);

  z-index: 9;

  pointer-events: none;

  user-select: none;
}
</style>
</head>

<body>

<div class="container">

<!-- IMAGE UPLOAD -->
<input type="file" id="fileInput" accept="image/*">

<!-- TEXT INPUT -->
<textarea id="textInput" placeholder="यहाँ अपना लेख लिखें..."></textarea>

<!-- WATERMARK INPUT -->
<input type="text" id="userName" placeholder="Watermark Name">

<!-- PREVIEW -->
<div class="preview">

  <!-- IMAGE -->
  <img id="img">

  <!-- TEXT -->
  <div class="text-box" id="textBox"></div>

  <!-- ✅ WATERMARK -->
  <div id="watermark" class="watermark"></div>

  <!-- VOICE BUTTONS -->
  <div class="voice-controls">

    <button id="voiceToggle">🎤 Voice</button>

    <div id="voiceOptions" style="display:none; margin-top:5px;">

      <button onclick="setVoice('female')">
        👩 Female
      </button>

      <button onclick="setVoice('male')">
        👨 Male
      </button>

      <button onclick="setVoice('auto')">
        Auto
      </button>

    </div>

  </div>

  <!-- PLAY BUTTON -->
  <button id="playBtn" class="play-btn">
    ▶
  </button>

</div>

</div>

<!-- SCRIPT -->
<script src="script.js"></script>

</body>
</html>
