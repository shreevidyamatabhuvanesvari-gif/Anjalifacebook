<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reel Creator</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: sans-serif;
  height: 100vh;
  overflow: hidden;
}

/* FULL SCREEN CONTAINER */
.container {
  width: 100%;
  height: 100vh;
}

/* INPUTS */
input,
textarea {
  width: 90%;
  margin: 10px auto;
  display: block;
  padding: 10px;
  font-size: 16px;
  border-radius: 6px;
  border: none;
  box-sizing: border-box;
}

/* TEXTAREA HEIGHT */
textarea {
  min-height: 120px;
  resize: vertical;
}

/* PREVIEW AREA */
.preview {
  position: relative;
  width: 100%;
  height: 100vh;
  background: black;
  overflow: hidden;
}

/* IMAGE */
.preview img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
}

/* TEXT BOX */
.text-box {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 90%;
  padding: 20px;
  background: rgba(0,0,0,0.6);
  color: white;
  text-align: center;
  font-size: 22px;
  line-height: 1.7;
  border-radius: 12px;
  z-index: 6;
}

/* WATERMARK BELOW TEXT BOX */
.watermark {
  position: absolute;
  top: calc(50% + 140px);
  left: 50%;
  transform: translateX(-50%);

  z-index: 7;

  padding: 8px 18px;

  background: rgba(0,0,0,0.55);

  color: rgba(255,255,255,0.92);

  font-size: 16px;
  font-weight: bold;
  font-style: italic;

  border-radius: 25px;

  border: 1px solid rgba(255,255,255,0.25);

  letter-spacing: 1px;

  text-shadow:
    1px 1px 4px rgba(0,0,0,0.9);

  box-shadow:
    0 4px 10px rgba(0,0,0,0.35);

  pointer-events: none;
  user-select: none;

  max-width: 80%;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}

/* PLAY BUTTON */
.play-btn {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 26px;
  padding: 14px 20px;
  border: none;
  border-radius: 50%;
  background: white;
  color: black;
  cursor: pointer;
  z-index: 10;
}

/* RESTART BUTTON */
.restart-btn {
  position: absolute;
  bottom: 20px;
  left: 20px;
  padding: 10px 16px;
  border: none;
  border-radius: 8px;
  background: rgba(255,255,255,0.9);
  color: black;
  cursor: pointer;
  z-index: 10;
}

/* VOICE BUTTONS */
.voice-controls {
  position: absolute;
  top: 10px;
  left: 10px;
  z-index: 8;
}

.voice-controls button {
  margin-right: 5px;
  padding: 6px 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container">

<!-- IMAGE UPLOAD -->
<input type="file" id="fileInput" accept="image/*">

<!-- TEXT INPUT -->
<textarea id="textInput" placeholder="यहाँ अपना लेख लिखें..."></textarea>

<!-- WATERMARK NAME INPUT -->
<input type="text" id="userName" placeholder="Watermark Name">

<!-- PREVIEW -->
<div class="preview">

  <!-- IMAGE -->
  <img id="img">

  <!-- TEXT -->
  <div class="text-box" id="textBox"></div>

  <!-- WATERMARK BELOW TEXT -->
  <div id="watermark" class="watermark"></div>

  <!-- VOICE BUTTONS -->
  <div class="voice-controls">

    <button id="voiceToggle">🎤 Voice</button>

    <div id="voiceOptions" style="display:none; margin-top:5px;">

      <button onclick="setVoice('female')">
        👩 Female
      </button>

      <button onclick="setVoice('male')">
        👨 Male
      </button>

      <button onclick="setVoice('auto')">
        Auto
      </button>

    </div>

  </div>

  <!-- PLAY BUTTON -->
  <button id="playBtn" class="play-btn">
    ▶
  </button>

  <!-- RESTART BUTTON -->
  <button id="restartBtn" class="restart-btn">
    Restart
  </button>

</div>

</div>

<!-- SCRIPT -->
<script src="script.js"></script>

</body>
</html>
