<!DOCTYPE html>
<html lang="hi">

<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>
  Reel Creator Pro
</title>

<style>

/* =====================================
   GLOBAL
===================================== */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  background:black;

  font-family:
    Arial,
    sans-serif;

  overflow:hidden;

  width:100vw;
  height:100vh;
}

/* =====================================
   MAIN CONTAINER
===================================== */

.container{

  width:100%;
  height:100vh;

  position:relative;

  overflow:hidden;
}

/* =====================================
   LEFT PANEL
===================================== */

.control-panel{

  position:absolute;

  top:0;
  left:0;

  width:380px;

  height:100vh;

  overflow-y:auto;

  background:
    rgba(0,0,0,0.82);

  backdrop-filter:
    blur(10px);

  z-index:100;

  padding:16px;
}

/* =====================================
   TITLE
===================================== */

.panel-title{

  color:white;

  font-size:28px;

  font-weight:bold;

  margin-bottom:18px;

  text-align:center;
}

/* =====================================
   WATERMARK
===================================== */

#userName{

  width:100%;

  padding:14px;

  border:none;

  border-radius:12px;

  margin-bottom:18px;

  background:#111;

  color:white;

  font-size:16px;
}

/* =====================================
   SCENE LIST
===================================== */

#sceneContainer{

  display:flex;

  flex-direction:column;

  gap:18px;
}

/* =====================================
   SCENE CARD
===================================== */

.scene-card{

  background:
    rgba(255,255,255,0.06);

  border:
    1px solid
    rgba(255,255,255,0.08);

  border-radius:18px;

  padding:14px;
}

/* =====================================
   SCENE TITLE
===================================== */

.scene-title{

  color:white;

  font-size:18px;

  font-weight:bold;

  margin-bottom:12px;
}

/* =====================================
   IMAGE INPUT
===================================== */

.scene-image{

  width:100%;

  margin-bottom:12px;

  color:white;
}

/* =====================================
   IMAGE PREVIEW
===================================== */

.scene-preview{

  width:100%;

  height:180px;

  object-fit:cover;

  border-radius:14px;

  margin-bottom:12px;

  display:none;
}

/* =====================================
   TEXTAREA
===================================== */

.scene-text{

  width:100%;

  min-height:150px;

  resize:vertical;

  border:none;

  outline:none;

  border-radius:14px;

  padding:14px;

  background:#111;

  color:white;

  font-size:16px;

  line-height:1.7;
}

/* =====================================
   REMOVE BUTTON
===================================== */

.remove-scene{

  width:100%;

  margin-top:12px;

  padding:12px;

  border:none;

  border-radius:12px;

  background:#ff4444;

  color:white;

  font-size:15px;

  font-weight:bold;

  cursor:pointer;
}

/* =====================================
   CONTROL BUTTONS
===================================== */

.controls{

  margin-top:20px;

  display:flex;

  flex-direction:column;

  gap:12px;
}

.controls button{

  padding:14px;

  border:none;

  border-radius:14px;

  font-size:16px;

  font-weight:bold;

  cursor:pointer;
}

/* =====================================
   ADD SCENE
===================================== */

#addSceneBtn{

  background:#444;

  color:white;
}

/* =====================================
   PLAY
===================================== */

#playBtn{

  background:#00cc66;

  color:white;
}

/* =====================================
   RESTART
===================================== */

#restartBtn{

  background:#ffaa00;

  color:black;
}

/* =====================================
   DOWNLOAD
===================================== */

#downloadBtn{

  background:#0066ff;

  color:white;
}

/* =====================================
   VOICE CONTROLS
===================================== */

.voice-controls{

  display:flex;

  flex-wrap:wrap;

  gap:10px;

  margin-top:10px;
}

.voice-controls button{

  flex:1;

  padding:12px;

  border:none;

  border-radius:12px;

  background:#222;

  color:white;

  cursor:pointer;
}

/* =====================================
   PREVIEW AREA
===================================== */

.preview{

  position:absolute;

  top:0;
  left:380px;

  width:calc(100% - 380px);

  height:100vh;

  overflow:hidden;

  background:black;
}

/* =====================================
   MAIN IMAGE
===================================== */

.preview img{

  width:100%;
  height:100%;

  object-fit:cover;

  display:none;
}

/* =====================================
   TEXT BOX
===================================== */

.text-box{

  position:absolute;

  top:50%;
  left:50%;

  transform:
    translate(-50%, -50%);

  width:88%;

  padding:28px;

  border-radius:22px;

  background:
    rgba(0,0,0,0.58);

  backdrop-filter:
    blur(8px);

  color:white;

  font-size:52px;

  font-weight:bold;

  line-height:1.7;

  text-align:center;

  word-break:break-word;

  overflow-wrap:break-word;

  z-index:10;
}

/* =====================================
   WATERMARK
===================================== */

.watermark{

  position:absolute;

  bottom:80px;

  left:50%;

  transform:
    translateX(-50%);

  padding:12px 22px;

  border-radius:40px;

  background:
    rgba(0,0,0,0.62);

  color:white;

  font-size:18px;

  font-style:italic;

  font-weight:bold;

  z-index:20;
}

/* =====================================
   CANVAS
===================================== */

#reelCanvas{

  display:none;
}

/* =====================================
   MOBILE
===================================== */

@media(max-width:900px){

  .control-panel{

    width:100%;

    height:50vh;
  }

  .preview{

    top:50vh;

    left:0;

    width:100%;

    height:50vh;
  }

  .text-box{

    font-size:28px;
  }
}

</style>

</head>

<body>

<div class="container">

  <!-- =================================
       CONTROL PANEL
  ================================== -->

  <div
    class="control-panel"
    id="controlPanel"
  >

    <div class="panel-title">

      Reel Creator Pro

    </div>

    <!-- WATERMARK -->

    <input
      type="text"
      id="userName"
      placeholder="Watermark Name"
    />

    <!-- =================================
         SCENES
    ================================== -->

    <div id="sceneContainer">

      <!-- SCENE 1 -->

      <div
        class="scene-card"
      >

        <div class="scene-title">

          Scene 1

        </div>

        <!-- PHOTO -->

        <input
          type="file"
          accept="image/*"
          class="scene-image"
        />

        <!-- PREVIEW -->

        <img
          class="scene-preview"
        />

        <!-- TEXT -->

        <textarea
          class="scene-text"
          placeholder="Scene 1 का टेक्स्ट लिखें..."
        ></textarea>

        <!-- REMOVE -->

        <button
          class="remove-scene"
        >

          Remove Scene

        </button>

      </div>

    </div>

    <!-- =================================
         CONTROLS
    ================================== -->

    <div class="controls">

      <!-- ADD SCENE -->

      <button
        id="addSceneBtn"
      >

        ➕ Add Next Photo

      </button>

      <!-- PLAY -->

      <button
        id="playBtn"
      >

        ▶ Play

      </button>

      <!-- RESTART -->

      <button
        id="restartBtn"
      >

        ↻ Restart

      </button>

      <!-- DOWNLOAD -->

      <button
        id="downloadBtn"
      >

        ⬇ Download

      </button>

      <!-- VOICE -->

      <div
        class="voice-controls"
      >

        <button
          id="voiceToggle"
        >

          🎤 Voice

        </button>

        <button
          onclick="setVoice('female')"
        >

          👩 Female

        </button>

        <button
          onclick="setVoice('male')"
        >

          👨 Male

        </button>

        <button
          onclick="setVoice('auto')"
        >

          🔀 Auto

        </button>

      </div>

    </div>

  </div>

  <!-- =================================
       PREVIEW AREA
  ================================== -->

  <div
    class="preview"
    id="preview"
  >

    <!-- CANVAS -->

    <canvas
      id="reelCanvas"
    ></canvas>

    <!-- MAIN IMAGE -->

    <img
      id="img"
      alt="preview"
    />

    <!-- TEXT -->

    <div
      class="text-box"
      id="textBox"
    ></div>

    <!-- WATERMARK -->

    <div
      class="watermark"
      id="watermark"
    ></div>

  </div>

</div>

<!-- =================================
     SCRIPTS
================================== -->

<script src="canvas-recorder.js"></script>

<script src="script.js"></script>

</body>

</html>
