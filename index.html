<!DOCTYPE html>
<html lang="hi">

<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>
  Reel Creator Pro
</title>

<style>

/* =========================
   GLOBAL
========================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  background:black;

  font-family:
    Arial,
    sans-serif;

  overflow:hidden;

  width:100vw;
  height:100vh;
}

/* =========================
   MAIN
========================= */

.container{

  width:100%;
  height:100vh;

  position:relative;

  overflow:hidden;
}

/* =========================
   CONTROL PANEL
========================= */

.control-panel{

  position:absolute;

  top:0;
  left:0;

  width:100%;

  z-index:100;

  padding:14px;

  background:
    rgba(0,0,0,0.75);

  backdrop-filter:
    blur(8px);

  display:flex;

  flex-direction:column;

  gap:12px;
}

/* =========================
   INPUTS
========================= */

input,
textarea,
button{

  border:none;
  outline:none;
}

input,
textarea{

  width:100%;

  border-radius:12px;

  background:#111;

  color:white;

  padding:14px;

  font-size:16px;
}

/* =========================
   TEXTAREA
========================= */

textarea{

  min-height:180px;

  resize:vertical;

  line-height:1.6;
}

/* =========================
   BUTTON ROW
========================= */

.button-row{

  display:flex;

  flex-wrap:wrap;

  gap:10px;
}

/* =========================
   BUTTONS
========================= */

button{

  padding:12px 18px;

  border-radius:12px;

  font-size:15px;

  font-weight:bold;

  cursor:pointer;

  transition:0.25s;
}

button:hover{

  transform:scale(1.03);
}

/* =========================
   PLAY
========================= */

#playBtn{

  background:#00cc66;

  color:white;
}

/* =========================
   RESTART
========================= */

#restartBtn{

  background:#ffaa00;

  color:black;
}

/* =========================
   DOWNLOAD
========================= */

#downloadBtn{

  background:#0066ff;

  color:white;
}

/* =========================
   SCENE BUTTONS
========================= */

.scene-btn{

  background:#222;

  color:white;
}

/* =========================
   VOICE
========================= */

.voice-controls{

  display:flex;

  flex-wrap:wrap;

  gap:10px;
}

.voice-controls button{

  background:#222;

  color:white;
}

/* =========================
   SCENE INFO
========================= */

#sceneCounter{

  color:white;

  font-size:16px;

  font-weight:bold;

  padding:10px;

  background:
    rgba(255,255,255,0.08);

  border-radius:10px;

  width:max-content;
}

/* =========================
   PREVIEW
========================= */

.preview{

  position:absolute;

  top:0;
  left:0;

  width:100%;
  height:100vh;

  overflow:hidden;

  background:black;
}

/* =========================
   IMAGE
========================= */

.preview img{

  width:100%;
  height:100%;

  object-fit:cover;

  display:none;
}

/* =========================
   TEXT BOX
========================= */

.text-box{

  position:absolute;

  top:50%;
  left:50%;

  transform:
    translate(-50%, -50%);

  width:88%;

  max-height:75vh;

  overflow:hidden;

  padding:28px;

  border-radius:22px;

  background:
    rgba(0,0,0,0.58);

  backdrop-filter:
    blur(8px);

  text-align:center;

  font-size:52px;

  font-weight:bold;

  line-height:1.7;

  color:white;

  z-index:20;

  word-break:break-word;

  overflow-wrap:break-word;
}

/* =========================
   WATERMARK
========================= */

.watermark{

  position:absolute;

  bottom:100px;

  left:50%;

  transform:
    translateX(-50%);

  z-index:30;

  padding:
    10px 20px;

  border-radius:40px;

  background:
    rgba(0,0,0,0.65);

  color:
    rgba(255,255,255,0.95);

  font-size:18px;

  font-weight:bold;

  font-style:italic;
}

/* =========================
   CANVAS
========================= */

#reelCanvas{

  display:none;
}

/* =========================
   MOBILE
========================= */

@media(max-width:768px){

  .text-box{

    width:92%;

    font-size:34px;

    line-height:1.6;

    padding:22px;
  }

  button{

    width:100%;
  }
}

/* =========================
   HIDE UI
========================= */

.hide-ui{

  display:none !important;
}

</style>

</head>

<body>

<div class="container">

  <!-- =====================
       CONTROL PANEL
  ====================== -->

  <div
    class="control-panel"
    id="controlPanel"
  >

    <!-- IMAGE INPUT -->

    <input
      type="file"
      id="fileInput"
      accept="image/*"
      multiple
    />

    <!-- TEXT -->

    <textarea
      id="textInput"
      placeholder="
Scene 1 का टेक्स्ट

----------------

Scene 2 का टेक्स्ट

----------------

Scene 3 का टेक्स्ट
"
    ></textarea>

    <!-- WATERMARK -->

    <input
      type="text"
      id="userName"
      placeholder="Watermark Name"
    />

    <!-- =====================
         SCENE CONTROLS
    ====================== -->

    <div class="button-row">

      <button
        id="prevSceneBtn"
        class="scene-btn"
      >
        ⬅ Previous
      </button>

      <button
        id="nextSceneBtn"
        class="scene-btn"
      >
        Next ➡
      </button>

      <button
        id="addSceneBtn"
        class="scene-btn"
      >
        ➕ Add Scene
      </button>

      <button
        id="deleteSceneBtn"
        class="scene-btn"
      >
        ❌ Delete Scene
      </button>

    </div>

    <!-- SCENE COUNTER -->

    <div id="sceneCounter">

      Scene 1 / 1

    </div>

    <!-- =====================
         MAIN BUTTONS
    ====================== -->

    <div class="button-row">

      <button id="playBtn">
        ▶ Play
      </button>

      <button id="restartBtn">
        ↻ Restart
      </button>

      <button id="downloadBtn">
        ⬇ Download
      </button>

    </div>

    <!-- =====================
         VOICE
    ====================== -->

    <div
      class="voice-controls"
      id="voiceControls"
    >

      <button
        id="voiceToggle"
      >
        🎤 Voice
      </button>

      <div
        id="voiceOptions"
        style="display:none;"
      >

        <button
          onclick="setVoice('female')"
        >
          👩 Female
        </button>

        <button
          onclick="setVoice('male')"
        >
          👨 Male
        </button>

        <button
          onclick="setVoice('auto')"
        >
          🔀 Auto
        </button>

      </div>

    </div>

  </div>

  <!-- =====================
       PREVIEW
  ====================== -->

  <div
    class="preview"
    id="preview"
  >

    <!-- CANVAS -->

    <canvas
      id="reelCanvas"
    ></canvas>

    <!-- IMAGE -->

    <img
      id="img"
      alt="preview"
    />

    <!-- TEXT -->

    <div
      class="text-box"
      id="textBox"
    ></div>

    <!-- WATERMARK -->

    <div
      class="watermark"
      id="watermark"
    ></div>

  </div>

</div>

<!-- =====================
     SCRIPTS
===================== -->

<script src="canvas-recorder.js"></script>

<script src="script.js"></script>

</body>

</html>
