<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reel Creator</title>

<style>
body { margin:0; background:black; font-family:sans-serif; }

.preview {
  position:relative;
  width:100%;
  height:100vh;
}

img {
  width:100%;
  height:100%;
  object-fit:cover;
  display:none;
}

.text-box {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:90%;
  padding:20px;
  background:rgba(0,0,0,0.6);
  color:white;
  text-align:center;
  font-size:28px;
  font-weight:bold;
  border-radius:12px;
}

.watermark {
  position:absolute;
  bottom:20px;
  right:20px;
  color:white;
  opacity:0.7;
}

button {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}
</style>
</head>

<body>

<input type="file" id="fileInput">
<textarea id="textInput" placeholder="लेख लिखें"></textarea>
<input id="userName" placeholder="नाम">

<div class="preview">
  <img id="img">
  <div id="textBox" class="text-box"></div>
  <div id="watermark" class="watermark"></div>

  <button id="playBtn">▶</button>
</div>

<script src="script.js"></script>
</body>
</html>
