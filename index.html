<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reel Creator Pro</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#000;
  font-family:Arial,sans-serif;
  overflow:hidden;
  width:100vw;
  height:100vh;
}

.container{
  width:100%;
  height:100vh;
  position:relative;
  overflow:hidden;
}

.control-panel{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  z-index:100;
  padding:14px;
  background:rgba(0,0,0,0.75);
  backdrop-filter:blur(8px);
  display:flex;
  flex-direction:column;
  gap:12px;
  max-height:55vh;
  overflow:auto;
}

input,
textarea,
button{
  border:none;
  outline:none;
}

input,
textarea{
  width:100%;
  border-radius:12px;
  background:#111;
  color:white;
  padding:14px;
  font-size:16px;
}

textarea{
  min-height:160px;
  resize:vertical;
  line-height:1.6;
}

.button-row{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

button{
  padding:12px 18px;
  border-radius:12px;
  font-size:15px;
  font-weight:bold;
  cursor:pointer;
  transition:0.25s;
}

button:hover{
  transform:scale(1.03);
}

#playBtn{
  background:#00cc66;
  color:white;
}

#restartBtn{
  background:#ffaa00;
  color:black;
}

#downloadBtn{
  background:#0066ff;
  color:white;
}

.scene-btn{
  background:#222;
  color:white;
}

#nextPhotoBtn{
  background:#cc00aa;
  color:white;
}

#updateTextBtn{
  background:#00aaff;
  color:white;
}

.voice-controls{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.voice-controls button{
  background:#222;
  color:white;
}

#sceneCounter{
  color:white;
  font-size:16px;
  font-weight:bold;
  padding:10px;
  background:rgba(255,255,255,0.08);
  border-radius:10px;
  width:max-content;
}

.preview{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100vh;
  overflow:hidden;
  background:black;
}

.preview img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.text-box{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  width:88%;
  max-height:75vh;
  overflow:hidden;
  padding:28px;
  border-radius:22px;
  background:rgba(0,0,0,0.58);
  backdrop-filter:blur(8px);
  text-align:center;
  font-size:52px;
  font-weight:bold;
  line-height:1.7;
  color:white;
  z-index:20;
  word-break:break-word;
  overflow-wrap:break-word;
}

.watermark{
  position:absolute;
  bottom:100px;
  left:50%;
  transform:translateX(-50%);
  z-index:30;
  padding:10px 20px;
  border-radius:40px;
  background:rgba(0,0,0,0.65);
  color:rgba(255,255,255,0.95);
  font-size:18px;
  font-weight:bold;
  font-style:italic;
}

#reelCanvas{
  display:none;
}

@media(max-width:768px){

  .text-box{
    width:92%;
    font-size:34px;
    line-height:1.6;
    padding:22px;
  }

  button{
    width:100%;
  }
}

.hide-ui{
  display:none !important;
}

</style>
</head>
<body>

<div class="container">

  <div class="control-panel" id="controlPanel">

    <!-- IMAGE INPUT -->

    <input
      type="file"
      id="fileInput"
      accept="image/*"
      multiple
    />

    <!-- TEXT -->

    <textarea
      id="textInput"
      placeholder="हर Scene का टेक्स्ट यहाँ लिखें"
    ></textarea>

    <!-- WATERMARK -->

    <input
      type="text"
      id="userName"
      placeholder="Watermark Name"
    />

    <!-- PHOTO CONTROLS -->

    <div class="button-row">

      <button id="prevPhotoBtn" class="scene-btn">
        🖼 Previous Photo
      </button>

      <button id="nextPhotoBtn">
        🖼 Next Photo
      </button>

      <button id="updateTextBtn">
        ✍ Update Text
      </button>

    </div>

    <!-- SCENE CONTROLS -->

    <div class="button-row">

      <button id="prevSceneBtn" class="scene-btn">
        ⬅ Previous Scene
      </button>

      <button id="nextSceneBtn" class="scene-btn">
        Next Scene ➡
      </button>

      <button id="addSceneBtn" class="scene-btn">
        ➕ Add Scene
      </button>

      <button id="deleteSceneBtn" class="scene-btn">
        ❌ Delete Scene
      </button>

    </div>

    <div id="sceneCounter">
      Scene 1 / 1
    </div>

    <!-- MAIN BUTTONS -->

    <div class="button-row">

      <button id="playBtn">
        ▶ Play
      </button>

      <button id="restartBtn">
        ↻ Restart
      </button>

      <button id="downloadBtn">
        ⬇ Download
      </button>

    </div>

  </div>

  <!-- PREVIEW -->

  <div class="preview" id="preview">

    <canvas id="reelCanvas"></canvas>

    <img id="img" alt="preview" />

    <div class="text-box" id="textBox"></div>

    <div class="watermark" id="watermark"></div>

  </div>

</div>

<script>

const fileInput = document.getElementById('fileInput');
const img = document.getElementById('img');
const textInput = document.getElementById('textInput');
const textBox = document.getElementById('textBox');
const watermark = document.getElementById('watermark');
const userName = document.getElementById('userName');
const sceneCounter = document.getElementById('sceneCounter');

const nextPhotoBtn = document.getElementById('nextPhotoBtn');
const prevPhotoBtn = document.getElementById('prevPhotoBtn');
const updateTextBtn = document.getElementById('updateTextBtn');

let images = [];
let currentImage = 0;

// =========================
// IMAGE LOAD
// =========================

fileInput.addEventListener('change', (e)=>{

  images = Array.from(e.target.files);

  if(images.length > 0){

    currentImage = 0;

    showImage(currentImage);

    updateCounter();
  }

});

// =========================
// SHOW IMAGE
// =========================

function showImage(index){

  const file = images[index];

  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(event){

    img.src = event.target.result;
  }

  reader.readAsDataURL(file);
}

// =========================
// NEXT PHOTO
// =========================

nextPhotoBtn.addEventListener('click', ()=>{

  if(images.length === 0) return;

  currentImage++;

  if(currentImage >= images.length){
    currentImage = 0;
  }

  showImage(currentImage);

  updateCounter();

});

// =========================
// PREVIOUS PHOTO
// =========================

prevPhotoBtn.addEventListener('click', ()=>{

  if(images.length === 0) return;

  currentImage--;

  if(currentImage < 0){
    currentImage = images.length - 1;
  }

  showImage(currentImage);

  updateCounter();

});

// =========================
// UPDATE TEXT BUTTON
// =========================

updateTextBtn.addEventListener('click', ()=>{

  textBox.innerText = textInput.value;

});

// =========================
// LIVE WATERMARK
// =========================

userName.addEventListener('input', ()=>{

  watermark.innerText = userName.value;

});

// =========================
// COUNTER
// =========================

function updateCounter(){

  sceneCounter.innerText =
    `Photo ${currentImage + 1} / ${images.length}`;
}

// =========================
// PLAY BUTTON
// =========================

document.getElementById('playBtn')
.addEventListener('click', ()=>{

  alert('Preview Started');

});

// =========================
// RESTART BUTTON
// =========================

document.getElementById('restartBtn')
.addEventListener('click', ()=>{

  currentImage = 0;

  if(images.length > 0){
    showImage(currentImage);
  }

  updateCounter();

});

// =========================
// DOWNLOAD BUTTON
// =========================

document.getElementById('downloadBtn')
.addEventListener('click', ()=>{

  alert('Download Feature Ready');

});

</script>
  
<script src="canvas-recorder.js"></script>

<script src="script.js"></script>
</body>
</html>
