<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reel Creator</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: sans-serif;
  height: 100vh;
  overflow: hidden;
}

/* CONTAINER */
.container {
  width: 100%;
  height: 100vh;
}

/* INPUTS */
input, textarea, select {
  width: 90%;
  margin: 8px auto;
  display: block;
  padding: 10px;
  font-size: 16px;
  border-radius: 6px;
  border: none;
}

/* PREVIEW */
.preview {
  position: relative;
  width: 100%;
  height: 100vh;
}

/* IMAGE */
.preview img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
}

/* TEXT */
.text-box {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 90%;
  padding: 20px;
  background: rgba(0,0,0,0.6);
  color: white;
  text-align: center;
  font-size: 26px; /* 🔥 bigger */
  font-weight: bold; /* 🔥 bold */
  line-height: 1.8;
  border-radius: 12px;
}

/* WATERMARK */
.watermark {
  position: absolute;
  bottom: 20px;
  right: 20px;
  font-size: 16px;
  opacity: 0.7;
  color: white;
}

/* PLAY */
.play-btn {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 26px;
  padding: 14px;
  border-radius: 50%;
  border: none;
  z-index: 10;
}

/* CONTROLS */
.controls {
  position: absolute;
  top: 10px;
  left: 10px;
  z-index: 10;
}
</style>
</head>

<body>

<div class="container">

<input type="file" id="fileInput" accept="image/*">
<textarea id="textInput" placeholder="लेख लिखें..."></textarea>

<input type="text" id="userName" placeholder="अपना नाम लिखें (Watermark)">
<select id="speedControl">
  <option value="0.8">Slow</option>
  <option value="1" selected>Normal</option>
  <option value="1.2">Fast</option>
</select>

<div class="preview">
  <img id="img">
  <div class="text-box" id="textBox"></div>
  <div class="watermark" id="watermark"></div>

  <div class="controls">
    <button onclick="setVoice('female')">👩</button>
    <button onclick="setVoice('male')">👨</button>
    <button onclick="setVoice('auto')">Auto</button>
  </div>

  <button id="playBtn" class="play-btn">▶</button>
  <button id="restartBtn" style="position:absolute;bottom:20px;left:20px;">Restart</button>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
