<!DOCTYPE html>
<html lang="hi">

<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>
  Reel Creator Pro
</title>

<style>

/* ===================================
   GLOBAL
=================================== */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  background:black;

  font-family:
    Arial,
    sans-serif;

  overflow:hidden;

  width:100vw;
  height:100vh;
}

/* ===================================
   APP CONTAINER
=================================== */

.container{

  width:100%;
  height:100vh;

  position:relative;

  overflow:hidden;
}

/* ===================================
   TOP CONTROL PANEL
=================================== */

.control-panel{

  position:absolute;

  top:0;
  left:0;

  width:100%;

  z-index:100;

  padding:14px;

  background:
    rgba(0,0,0,0.72);

  backdrop-filter:blur(8px);

  display:flex;

  flex-direction:column;

  gap:10px;
}

/* ===================================
   INPUTS
=================================== */

input,
textarea,
button{

  border:none;
  outline:none;
}

/* ===================================
   MULTI IMAGE INPUT
=================================== */

#fileInput{

  width:100%;

  padding:12px;

  background:#111;

  color:white;

  border-radius:10px;

  font-size:16px;
}

/* ===================================
   TEXT INPUT
=================================== */

#textInput{

  width:100%;

  min-height:160px;

  resize:vertical;

  padding:14px;

  border-radius:10px;

  background:#111;

  color:white;

  font-size:18px;

  line-height:1.6;
}

/* ===================================
   WATERMARK INPUT
=================================== */

#userName{

  width:100%;

  padding:12px;

  border-radius:10px;

  background:#111;

  color:white;

  font-size:16px;
}

/* ===================================
   BUTTON ROW
=================================== */

.button-row{

  display:flex;

  flex-wrap:wrap;

  gap:10px;
}

/* ===================================
   BUTTONS
=================================== */

button{

  cursor:pointer;

  font-size:15px;

  font-weight:bold;

  border-radius:10px;

  padding:12px 16px;

  transition:0.25s;
}

button:hover{

  transform:scale(1.03);
}

/* ===================================
   PLAY
=================================== */

#playBtn{

  background:#00cc66;

  color:white;
}

/* ===================================
   RESTART
=================================== */

#restartBtn{

  background:#ffaa00;

  color:black;
}

/* ===================================
   DOWNLOAD
=================================== */

#downloadBtn{

  background:#0066ff;

  color:white;
}

/* ===================================
   VOICE CONTROLS
=================================== */

.voice-controls{

  display:flex;

  gap:10px;

  flex-wrap:wrap;
}

.voice-controls button{

  background:#222;

  color:white;
}

/* ===================================
   PREVIEW
=================================== */

.preview{

  position:absolute;

  top:0;
  left:0;

  width:100%;
  height:100vh;

  background:black;

  overflow:hidden;
}

/* ===================================
   MAIN IMAGE
=================================== */

.preview img{

  width:100%;
  height:100%;

  object-fit:cover;

  display:none;
}

/* ===================================
   TEXT AREA
=================================== */

.text-box{

  position:absolute;

  top:50%;
  left:50%;

  transform:
    translate(-50%, -50%);

  width:88%;

  max-height:75vh;

  overflow:hidden;

  padding:28px;

  border-radius:22px;

  background:
    rgba(0,0,0,0.58);

  backdrop-filter:
    blur(8px);

  text-align:center;

  font-size:52px;

  font-weight:bold;

  line-height:1.65;

  color:white;

  z-index:20;

  word-break:break-word;

  overflow-wrap:break-word;

  box-shadow:
    0 0 30px
    rgba(0,0,0,0.45);
}

/* ===================================
   WATERMARK
=================================== */

.watermark{

  position:absolute;

  bottom:110px;

  left:50%;

  transform:
    translateX(-50%);

  z-index:30;

  padding:
    10px 20px;

  border-radius:50px;

  background:
    rgba(0,0,0,0.62);

  color:
    rgba(255,255,255,0.95);

  font-size:18px;

  font-style:italic;

  font-weight:bold;

  letter-spacing:1px;

  border:
    1px solid
    rgba(255,255,255,0.2);

  backdrop-filter:blur(5px);

  max-width:80%;

  overflow:hidden;

  text-overflow:ellipsis;

  white-space:nowrap;
}

/* ===================================
   CANVAS
=================================== */

#reelCanvas{

  display:none;
}

/* ===================================
   MOBILE
=================================== */

@media(max-width:768px){

  .text-box{

    width:92%;

    font-size:34px;

    line-height:1.6;

    padding:22px;
  }

  .watermark{

    font-size:15px;
  }

  button{

    width:100%;
  }
}

/* ===================================
   HIDE UI
=================================== */

.hide-ui{

  display:none !important;
}

</style>

</head>

<body>

<div class="container">

  <!-- =========================
       CONTROL PANEL
  ========================== -->

  <div
    class="control-panel"
    id="controlPanel"
  >

    <!-- MULTI IMAGE -->
    <input
      type="file"
      id="fileInput"
      accept="image/*"
      multiple
    />

    <!-- MULTI TEXT -->
    <textarea
      id="textInput"
      placeholder="
फोटो और टेक्स्ट क्रम में लिखें।

उदाहरण:

[PHOTO 1]
यह पहला लेख है।

[PHOTO 2]
यह दूसरा लेख है।
"
    ></textarea>

    <!-- WATERMARK -->
    <input
      type="text"
      id="userName"
      placeholder="Watermark Name"
    />

    <!-- BUTTONS -->
    <div class="button-row">

      <button id="playBtn">
        ▶ Play
      </button>

      <button id="restartBtn">
        ↻ Restart
      </button>

      <button id="downloadBtn">
        ⬇ Download
      </button>

    </div>

    <!-- VOICE -->
    <div
      class="voice-controls"
      id="voiceControls"
    >

      <button
        id="voiceToggle"
      >
        🎤 Voice
      </button>

      <div
        id="voiceOptions"
        style="display:none;"
      >

        <button
          onclick="setVoice('female')"
        >
          👩 Female
        </button>

        <button
          onclick="setVoice('male')"
        >
          👨 Male
        </button>

        <button
          onclick="setVoice('auto')"
        >
          🔀 Auto
        </button>

      </div>

    </div>

  </div>

  <!-- =========================
       PREVIEW
  ========================== -->

  <div
    class="preview"
    id="preview"
  >

    <!-- HIDDEN CANVAS -->
    <canvas
      id="reelCanvas"
    ></canvas>

    <!-- MAIN IMAGE -->
    <img
      id="img"
      alt="preview"
    />

    <!-- TEXT -->
    <div
      class="text-box"
      id="textBox"
    ></div>

    <!-- WATERMARK -->
    <div
      class="watermark"
      id="watermark"
    ></div>

  </div>

</div>

<!-- =========================
     SCRIPTS
========================== -->

<script src="canvas-recorder.js"></script>

<script src="script.js"></script>

</body>

</html>
