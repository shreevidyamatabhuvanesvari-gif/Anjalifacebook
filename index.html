<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Reel Creator Pro</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #050505;
      --panel: #111111;
      --border: #262626;
      --text: #ffffff;
      --muted: #9ca3af;
      --accent: #ffcc00;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
      overflow: hidden;
      height: 100vh;
    }

    #app {
      width: 100%;
      height: 100vh;
      display: grid;
      grid-template-columns: 420px 1fr;
    }

    /*
    ========================================
    EDITOR PANEL
    ========================================
    */

    #editorPanel {
      background: var(--panel);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 20px;
    }

    .editor-header {
      margin-bottom: 24px;
    }

    .editor-header h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .editor-header p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    #sceneContainer {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .scene-card {
      background: #181818;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
    }

    .scene-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .scene-title {
      font-size: 15px;
      font-weight: bold;
    }

    .scene-remove-btn {
      background: #2b2b2b;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 10px;
      cursor: pointer;
    }

    .scene-remove-btn:hover {
      background: #3a3a3a;
    }

    .scene-field {
      margin-bottom: 16px;
    }

    .scene-field label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: var(--muted);
    }

    .scene-image-input,
    .scene-text-input,
    #voiceSelect,
    #watermarkInput {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #0d0d0d;
      color: white;
      padding: 12px;
      font-size: 14px;
    }

    .scene-text-input {
      resize: vertical;
      min-height: 140px;
      line-height: 1.7;
    }

    .scene-preview {
      width: 100%;
      height: 220px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #000;
      margin-top: 10px;
    }

    .scene-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /*
    ========================================
    CONTROLS
    ========================================
    */

    .global-controls {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .control-group label {
      font-size: 14px;
      color: var(--muted);
    }

    .action-buttons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s ease;
    }

    #addSceneBtn {
      background: #202020;
      color: white;
    }

    #playBtn {
      background: var(--accent);
      color: black;
    }

    #restartBtn {
      background: #2a2a2a;
      color: white;
    }

    #downloadBtn {
      background: #2a2a2a;
      color: white;
    }

    button:hover {
      transform: translateY(-1px);
    }

    /*
    ========================================
    PREVIEW PANEL
    ========================================
    */

    #previewPanel {
      display: flex;
      justify-content: center;
      align-items: center;
      background: black;
      position: relative;
      overflow: hidden;
    }

    #cinematicPreview {
      position: relative;
      width: 100%;
      max-width: 420px;
      aspect-ratio: 9 / 16;
      background: #000;
      overflow: hidden;
      border-radius: 24px;
      border: 1px solid #1f1f1f;
    }

    /*
    ========================================
    HIDDEN RENDER CANVAS
    ========================================
    */

    #renderCanvas {
      display: none;
    }

    /*
    ========================================
    PLAYBACK MODE
    ========================================
    */

    .playback-mode #editorPanel {
      display: none;
    }

    .playback-mode #app {
      grid-template-columns: 1fr;
    }

    .playback-mode #cinematicPreview {
      max-width: 100vw;
      height: 100vh;
      border-radius: 0;
    }

    /*
    ========================================
    RESPONSIVE
    ========================================
    */

    @media (max-width: 980px) {
      #app {
        grid-template-columns: 1fr;
      }

      #editorPanel {
        height: 50vh;
      }

      #previewPanel {
        height: 50vh;
      }

      #cinematicPreview {
        height: 100%;
      }
    }
  </style>
</head>

<body>

  <div id="app">

    <!-- ===================================== -->
    <!-- EDITOR PANEL -->
    <!-- ===================================== -->

    <aside id="editorPanel">

      <header class="editor-header">
        <h1>Reel Creator Pro</h1>

        <p>
          Create cinematic multi-scene reels with
          narration, animation, and auto-export.
        </p>
      </header>

      <!-- Scene Container -->

      <section id="sceneContainer">

        <!-- Default Scene Card -->

        <article class="scene-card">

          <div class="scene-topbar">
            <div class="scene-title">
              Scene 1
            </div>

            <button
              type="button"
              class="scene-remove-btn"
            >
              Remove
            </button>
          </div>

          <div class="scene-field">
            <label>
              Upload Photo
            </label>

            <input
              type="file"
              accept="image/*"
              class="scene-image-input"
            />
          </div>

          <div class="scene-field">
            <label>
              Scene Narration
            </label>

            <textarea
              class="scene-text-input"
              placeholder="Write cinematic narration..."
            ></textarea>
          </div>

          <div class="scene-preview">
            <img
              src=""
              alt="Scene Preview"
            />
          </div>

        </article>

      </section>

      <!-- Global Controls -->

      <footer class="global-controls">

        <div class="control-group">
          <label for="voiceSelect">
            Voice Mode
          </label>

          <select id="voiceSelect">

            <option value="female">
              Female Voice
            </option>

            <option value="male">
              Male Voice
            </option>

            <option value="auto">
              Auto Voice
            </option>

          </select>
        </div>

        <div class="control-group">
          <label for="watermarkInput">
            Watermark
          </label>

          <input
            type="text"
            id="watermarkInput"
            placeholder="Enter watermark text..."
          />
        </div>

        <div class="action-buttons">

          <button id="addSceneBtn">
            Add Scene
          </button>

          <button id="playBtn">
            Play Reel
          </button>

          <button id="restartBtn">
            Restart
          </button>

          <button id="downloadBtn">
            Download
          </button>

        </div>

      </footer>

    </aside>

    <!-- ===================================== -->
    <!-- PREVIEW PANEL -->
    <!-- ===================================== -->

    <main id="previewPanel">

      <section id="cinematicPreview">

        <!-- Cinematic render layer injected later -->

      </section>

    </main>

  </div>

  <!-- Hidden Production Canvas -->

  <canvas id="renderCanvas"></canvas>

  <!-- ===================================== -->
  <!-- ENGINE LOAD ORDER -->
  <!-- ===================================== -->

  <script src="timeline-engine.js"></script>

  <script src="tts-engine.js"></script>

  <script src="canvas-recorder.js"></script>

  <script src="script.js"></script>

</body>
</html>
